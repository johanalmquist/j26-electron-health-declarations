name: Build

# Triggered when changesets/action creates a GitHub Release after a version bump.
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-mac:
    name: Build macOS (DMG)
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build unsigned. Without an Apple Developer certificate the DMG ships
      # without a notarization seal; users must right-click → Open on first launch.
      - name: Build macOS DMG
        run: npm run dist:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Upload DMG to release
        run: gh release upload "${{ github.event.release.tag_name }}" release/*.dmg --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    name: Build Windows (NSIS)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # Build unsigned. Windows SmartScreen will show an "Unknown publisher"
      # warning on first run; users click "More info" → "Run anyway".
      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload installer to release
        shell: bash
        run: gh release upload "${{ github.event.release.tag_name }}" release/*.exe --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
